<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS Project Tutorial — MapSwipe</title>

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --ms-red:       #E8472A;
      --ms-red-dark:  #C73A20;
      --ms-red-light: #FDECEA;
      --ms-dark:      #1A1A2E;
      --ms-gray:      #6B7280;
      --ms-gray-light:#F3F4F6;
      --ms-border:    #E5E7EB;
      --ms-white:     #FFFFFF;
      --radius:       8px;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:    0 4px 12px rgba(0,0,0,.10);
      --font:         'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--ms-gray-light);
      color: var(--ms-dark);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ───────────────────────────────────────────── */
    header {
      background: var(--ms-white);
      border-bottom: 1px solid var(--ms-border);
      box-shadow: var(--shadow-sm);
      z-index: 10;
      flex-shrink: 0;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--ms-red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Simple hand-drawn swipe arrow icon in SVG */
    .logo-icon svg { width: 20px; height: 20px; }

    .logo-text {
      font-weight: 700;
      font-size: 16px;
      color: var(--ms-dark);
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--ms-red); }

    .divider {
      width: 1px;
      height: 28px;
      background: var(--ms-border);
      flex-shrink: 0;
    }

    .page-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ms-gray);
      flex-shrink: 0;
    }

    /* ── Control panel ─────────────────────────────────────── */
    .controls {
      background: var(--ms-white);
      border-bottom: 1px solid var(--ms-border);
      flex-shrink: 0;
    }

    .controls-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .controls-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .field {
      flex: 1;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    label {
      font-size: 10px;
      font-weight: 600;
      color: var(--ms-gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    input[type="text"] {
      flex: 1;
      height: 32px;
      padding: 0 10px;
      border: 1.5px solid var(--ms-border);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: var(--font);
      color: var(--ms-dark);
      background: var(--ms-white);
      transition: border-color .15s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--ms-red);
      box-shadow: 0 0 0 3px rgba(232,71,42,.12);
    }

    input[type="text"]::placeholder { color: #9CA3AF; }

    .btn {
      height: 32px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s, transform .1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--ms-red);
      color: #fff;
    }

    .btn-primary:hover { background: var(--ms-red-dark); }

    .btn-secondary {
      background: var(--ms-gray-light);
      color: var(--ms-dark);
      border: 1.5px solid var(--ms-border);
    }

    .btn-secondary:hover { background: var(--ms-border); }

    .tms-type-toggle {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
    }

    .toggle-group {
      display: flex;
      border: 1.5px solid var(--ms-border);
      border-radius: var(--radius);
      overflow: hidden;
      height: 32px;
    }

    .toggle-group input[type="radio"] { display: none; }

    .toggle-group label {
      padding: 0 11px;
      display: flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
      color: var(--ms-gray);
      background: var(--ms-white);
      transition: background .15s, color .15s;
      border-right: 1px solid var(--ms-border);
      user-select: none;
    }

    .toggle-group label:last-child { border-right: none; }

    .toggle-group input[type="radio"]:checked + label {
      background: var(--ms-red-light);
      color: var(--ms-red);
    }

    /* ── Status bar ────────────────────────────────────────── */
    .status-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--ms-red-light);
      border-bottom: 1px solid rgba(232,71,42,.2);
      font-size: 12px;
      color: var(--ms-red-dark);
      font-weight: 500;
    }

    .status-bar.visible { display: flex; }
    .status-bar.error { background: #FEF2F2; border-color: #FECACA; color: #DC2626; }
    .status-bar.success { background: #F0FDF4; border-color: #BBF7D0; color: #166534; }

    /* ── Map container ─────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
    }


    /* ── Zoom badge ────────────────────────────────────────── */
    .zoom-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(6px);
      border: 1px solid var(--ms-border);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ms-dark);
      box-shadow: var(--shadow-sm);
      pointer-events: none;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 5px;
      letter-spacing: -0.2px;
    }

    .zoom-badge .zl { color: var(--ms-gray); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* MapLibre attribution tweaks */
    .maplibregl-ctrl-attrib { font-size: 10px; }

    /* ── Empty state overlay ───────────────────────────────── */
    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
      z-index: 1;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      background: var(--ms-red-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-icon svg { width: 28px; height: 28px; color: var(--ms-red); }

    .empty-text {
      text-align: center;
      font-size: 14px;
      color: var(--ms-gray);
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(4px);
      padding: 8px 16px;
      border-radius: 20px;
    }

    .empty-text strong { color: var(--ms-dark); display: block; font-size: 15px; margin-bottom: 2px; }

    /* ── Opacity slider ────────────────────────────────────── */
    .opacity-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
      min-width: 110px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--ms-red);
      cursor: pointer;
    }

    .opacity-val {
      font-size: 12px;
      font-weight: 600;
      color: var(--ms-dark);
      min-width: 32px;
      text-align: right;
    }

    /* ── GeoJSON field ─────────────────────────────────────── */
    .geojson-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    .gj-filename-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--ms-gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      align-self: center;
      display: none;
    }

    .gj-filename-label.visible { display: block; }

    /* ── Drop overlay ──────────────────────────────────────── */
    #drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(232,71,42,.10);
      border: 3px dashed var(--ms-red);
      border-radius: 4px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }

    #drop-overlay.active { display: flex; }

    .drop-msg {
      background: rgba(255,255,255,.96);
      border-radius: var(--radius);
      padding: 14px 24px;
      text-align: center;
      font-weight: 600;
      color: var(--ms-red);
      font-size: 14px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── GeoJSON badge (below zoom badge) ──────────────────── */
    #geojson-badge {
      position: absolute;
      top: 50px;
      left: 12px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(6px);
      border: 1px solid var(--ms-border);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 11px;
      color: var(--ms-gray);
      line-height: 1.5;
      box-shadow: var(--shadow-sm);
      pointer-events: none;
      display: none;
      gap: 6px;
      align-items: flex-start;
      max-width: 200px;
    }

    #geojson-badge.visible { display: flex; }

    #geojson-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ms-red);
      flex-shrink: 0;
      margin-top: 2px;
    }

    #geojson-badge .gj-name { font-weight: 600; color: var(--ms-dark); font-size: 12px; }

    /* ── Feature popup ─────────────────────────────────────── */
    #feature-popup {
      position: absolute;
      display: none;
      flex-direction: column;
      background: var(--ms-white);
      border: 1px solid var(--ms-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      min-width: 190px;
      max-width: 260px;
      max-height: 300px;
      z-index: 20;
      overflow: hidden;
      pointer-events: all;
    }

    #feature-popup.visible {
      display: flex;
      animation: popup-in .14s ease;
    }

    @keyframes popup-in {
      from { opacity: 0; transform: scale(.95) translateY(-3px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: var(--ms-gray-light);
      border-bottom: 1px solid var(--ms-border);
      flex-shrink: 0;
      gap: 8px;
    }

    .popup-geom-chip {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--ms-red);
      flex: 1;
    }

    .popup-close {
      width: 18px; height: 18px;
      border: none; background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ms-gray);
      font-size: 14px; line-height: 1;
      border-radius: 4px;
      transition: background .1s;
      flex-shrink: 0;
    }

    .popup-close:hover { background: var(--ms-border); }

    .popup-body {
      overflow-y: auto;
      flex: 1;
    }

    .popup-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 8px;
      padding: 5px 10px;
      border-bottom: 1px solid var(--ms-gray-light);
      font-size: 11px;
    }

    .popup-row:last-child { border-bottom: none; }

    .popup-key {
      color: var(--ms-gray);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .popup-val {
      color: var(--ms-dark);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .popup-val.null-val { color: #9CA3AF; font-weight: 400; font-style: italic; }

    .popup-empty {
      padding: 12px 10px;
      font-size: 11px;
      color: var(--ms-gray);
      text-align: center;
    }

    .popup-footer {
      padding: 8px 10px;
      border-top: 1px solid var(--ms-border);
      background: var(--ms-gray-light);
      flex-shrink: 0;
    }

    .popup-footer .btn {
      width: 100%;
      height: 32px;
      font-size: 12px;
      justify-content: center;
    }

    .popup-footer .btn:disabled {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }

    /* ── Tutorial panel ────────────────────────────────────── */
    #tutorial-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--ms-white);
      border-left: 1px solid var(--ms-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .tutorial-header {
      padding: 13px 14px;
      border-bottom: 1px solid var(--ms-border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tutorial-header strong { font-size: 13px; font-weight: 700; color: var(--ms-dark); }

    .tutorial-count {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--ms-red-light);
      color: var(--ms-red);
    }

    .tutorial-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tutorial-empty {
      padding: 32px 12px;
      text-align: center;
      font-size: 12px;
      color: var(--ms-gray);
      line-height: 1.7;
    }

    .tutorial-card {
      border: 1px solid var(--ms-border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 11px;
      flex-shrink: 0;
      height: 180px;
      display: flex;
      flex-direction: column;
    }

    .tc-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      background: var(--ms-gray-light);
      border-bottom: 1px solid var(--ms-border);
    }

    .tc-screen {
      flex: 1;
      font-weight: 700;
      font-size: 12px;
      color: var(--ms-dark);
    }

    .tc-geom {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--ms-red);
    }

    .tc-remove {
      width: 20px; height: 20px;
      border: none; background: none;
      cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: var(--ms-gray); font-size: 15px;
      transition: background .1s, color .1s;
      flex-shrink: 0;
    }

    .tc-remove:hover { background: #FEE2E2; color: #DC2626; }

    .tc-props { padding: 4px 0; flex: 1; min-height: 0; overflow-y: auto; }

    .tc-prop {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 6px;
      padding: 4px 10px;
      border-bottom: 1px solid var(--ms-gray-light);
    }

    .tc-prop:last-child { border-bottom: none; }

    .tc-key {
      color: var(--ms-gray);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .tc-val {
      color: var(--ms-dark); font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-align: right;
    }

    .tc-new-props {
      padding: 6px 10px;
      background: var(--ms-red-light);
      border-top: 1px solid rgba(232,71,42,.2);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tc-new-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      font-size: 11px;
    }

    .tc-new-key { color: var(--ms-red); font-weight: 600; flex-shrink: 0; }
    .tc-new-val { color: var(--ms-red-dark); font-weight: 500; text-align: right; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tutorial-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--ms-border);
      background: var(--ms-gray-light);
      flex-shrink: 0;
    }

    .tutorial-footer .btn {
      width: 100%;
      justify-content: center;
      height: 36px;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">
          <!-- Swipe / map pin icon -->
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2C7.24 2 5 4.24 5 7c0 3.75 5 11 5 11s5-7.25 5-11c0-2.76-2.24-5-5-5zm0 6.5c-.83 0-1.5-.67-1.5-1.5S9.17 5.5 10 5.5s1.5.67 1.5 1.5S10.83 8.5 10 8.5z" fill="white"/>
          </svg>
        </div>
        <span class="logo-text">Map<span>Swipe</span></span>
      </a>
      <div class="divider"></div>
      <span class="page-title">MapSwipe Locate Project's Tutorial Scenario Page Builder</span>
    </div>
  </header>

  <!-- ── Controls ── -->
  <div class="controls">
    <div class="controls-inner">

      <!-- Row 1: imagery URL -->
      <div class="controls-row">
        <div class="field">
          <label>TMS / XYZ Tile URL</label>
          <div class="input-row">
            <input
              type="text"
              id="tms-url"
              placeholder="https://tiles.example.com/{z}/{x}/{y}.png"
              value="https://tiles.openaerialmap.org/690585b76415e43597ffd7ea/0/690585b76415e43597ffd7eb/{z}/{x}/{y}"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="btn btn-primary" id="load-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="5 12 12 5 19 12"/><line x1="12" y1="5" x2="12" y2="19"/>
              </svg>
              Load
            </button>
            <button class="btn btn-secondary" id="clear-btn" title="Remove layer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Row 2: project settings -->
      <div class="controls-row">
        <div class="tms-type-toggle">
          <label>Scheme</label>
          <div class="toggle-group">
            <input type="radio" name="scheme" id="scheme-xyz" value="xyz" checked />
            <label for="scheme-xyz">XYZ</label>
            <input type="radio" name="scheme" id="scheme-tms" value="tms" />
            <label for="scheme-tms">TMS</label>
          </div>
        </div>

        <div class="tms-type-toggle">
          <label>Sub grid size</label>
          <div class="toggle-group">
            <input type="radio" name="subgrid" id="subgrid-2" value="2" checked />
            <label for="subgrid-2">2×2</label>
            <input type="radio" name="subgrid" id="subgrid-4" value="4" />
            <label for="subgrid-4">4×4</label>
            <input type="radio" name="subgrid" id="subgrid-8" value="8" />
            <label for="subgrid-8">8×8</label>
          </div>
        </div>

        <div class="opacity-field">
          <label>Opacity</label>
          <div class="slider-row">
            <input type="range" id="opacity-slider" min="0" max="100" value="100" />
            <span class="opacity-val" id="opacity-val">100%</span>
          </div>
        </div>

        <div class="geojson-field">
          <label title="Download this file from the 'Processed Tasks' section in the tutorial edit page in MapSwipe, then load it here.">
            Load Processed Tasks GeoJSON
            <svg style="vertical-align:middle;margin-left:3px;flex-shrink:0" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </label>
          <div class="input-row">
            <button class="btn btn-secondary" id="geojson-btn" title="Download this file from the 'Processed Tasks' section in the tutorial edit page in MapSwipe, then load it here.">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              Load file
            </button>
            <span class="gj-filename-label" id="gj-filename-label"></span>
            <button class="btn btn-secondary" id="clear-geojson-btn" title="Remove GeoJSON layer" style="display:none">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
            <input type="file" id="geojson-input" accept=".geojson,.json" style="display:none" />
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Status bar ── -->
  <div class="status-bar" id="status-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="status-icon">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="status-text"></span>
  </div>

  <!-- ── Main area ── -->
  <div style="flex:1; display:flex; overflow:hidden;">
  <div style="position:relative; flex:1; display:flex; flex-direction:column;">
    <div id="map"></div>

    <!-- Empty state -->
    <div id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
      </div>
      <div class="empty-text">
        <strong>No imagery loaded</strong>
        Paste a TMS or XYZ tile URL above and click Load
      </div>
    </div>

    <!-- Drop overlay -->
    <div id="drop-overlay">
      <div class="drop-msg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Drop GeoJSON to load
      </div>
    </div>

    <!-- Zoom badge -->
    <div class="zoom-badge" id="zoom-badge">
      <span class="zl">Z</span><span id="zoom-val">—</span>
    </div>

    <!-- GeoJSON badge -->
    <div id="geojson-badge">
      <span class="dot"></span>
      <div><span class="gj-name" id="gj-name"></span><br><span id="gj-meta"></span></div>
    </div>


    <!-- Feature popup -->
    <div id="feature-popup">
      <div class="popup-header">
        <span class="popup-geom-chip" id="popup-geom"></span>
        <button class="popup-close" id="popup-close">&#x2715;</button>
      </div>
      <div class="popup-body" id="popup-body"></div>
      <div class="popup-footer">
        <button class="btn btn-primary" id="popup-add-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add to Tutorial
        </button>
      </div>
    </div>
  </div>

  <!-- ── Tutorial panel ── -->
  <div id="tutorial-panel">
    <div class="tutorial-header">
      <strong>Tutorial Features</strong>
      <span class="tutorial-count" id="tutorial-count">0</span>
    </div>
    <div class="tutorial-list" id="tutorial-list">
      <div class="tutorial-empty">No features added yet.<br>Click a feature on the map and press "Add to Tutorial".</div>
    </div>
    <div class="tutorial-footer">
      <button class="btn btn-primary" id="download-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download Scenario Pages as .geojson
      </button>
    </div>
  </div>

  </div><!-- end main-area -->

  <script>
    // ── Map init ──────────────────────────────────────────────
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxzoom: 19
          }
        },
        layers: [{
          id: 'osm-base',
          type: 'raster',
          source: 'osm',
          paint: { 'raster-opacity': 1 }
        }]
      },
      center: [0, 20],
      zoom: 2,
      attributionControl: false
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

    const LAYER_ID  = 'tms-overlay';
    const SOURCE_ID = 'tms-source';

    // ── Helpers ───────────────────────────────────────────────
    function showStatus(msg, type = 'info') {
      const bar  = document.getElementById('status-bar');
      const text = document.getElementById('status-text');
      bar.className = `status-bar visible ${type}`;
      text.textContent = msg;
      if (type === 'success') setTimeout(() => bar.classList.remove('visible'), 3000);
    }

    function hideStatus() {
      document.getElementById('status-bar').classList.remove('visible');
    }

    function setEmptyState(visible) {
      document.getElementById('empty-state').style.display = visible ? 'flex' : 'none';
    }

    function setInfoBadge() {}

    // ── TileJSON fetch ────────────────────────────────────────
    // Pattern 1 — OAM tiles (tiles.openaerialmap.org):
    //   Tile URL:    https://tiles.openaerialmap.org/{id1}/{n}/{id2}/{z}/{x}/{y}
    //   S3 COG URL:  https://oin-hotosm-temp.s3.us-east-1.amazonaws.com/{id1}/{n}/{id2}.tif
    //   TileJSON:    https://titiler.hotosm.org/cog/WebMercatorQuad/tilejson.json?url={cogUrl}
    //
    // Pattern 2 — generic: strip /{z}/{x}/{y} and GET the base URL as TileJSON

    const TITILER_BASE = 'https://titiler.hotosm.org/cog/WebMercatorQuad/tilejson.json';
    const OAM_COG_BASE = 'https://oin-hotosm-temp.s3.us-east-1.amazonaws.com';

    async function fetchTileJSON(tileUrl) {
      let tjUrl = null;

      // Pattern 1: OAM tile URL
      const oamMatch = tileUrl.match(
        /^https?:\/\/tiles\.openaerialmap\.org\/([\w]+\/\d+\/[\w]+)\/\{z\}/
      );
      if (oamMatch) {
        const path   = oamMatch[1]; // e.g. "690585b76415e43597ffd7ea/0/690585b76415e43597ffd7eb"
        const cogUrl = `${OAM_COG_BASE}/${path}.tif`;
        tjUrl = `${TITILER_BASE}?url=${encodeURIComponent(cogUrl)}`;
      } else {
        // Pattern 2: strip /{z}/{x}/{y}[.ext] and try the base URL
        const base = tileUrl.replace(/\/\{z\}\/\{x\}\/\{y\}(\.\w+)?$/, '');
        if (base !== tileUrl) tjUrl = base;
      }

      if (!tjUrl) return null;

      try {
        const res = await fetch(tjUrl, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) return null;
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('json')) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    // ── Layer management ──────────────────────────────────────
    function removeLayer() {
      if (map.getLayer(LAYER_ID))   map.removeLayer(LAYER_ID);
      if (map.getSource(SOURCE_ID)) map.removeSource(SOURCE_ID);
    }

    async function loadTMS(rawUrl, scheme, opacity) {
      const url = rawUrl.trim();
      if (!url) { showStatus('Please enter a tile URL.', 'error'); return; }

      removeLayer();
      showStatus('Fetching imagery metadata…', 'info');

      // Fetch TileJSON first — it may give us a better tile URL + bounds
      const tj = await fetchTileJSON(url);

      // Prefer the tile URL from TileJSON (titiler's working endpoint) over the raw input
      const tileUrl     = (tj && tj.tiles && tj.tiles[0]) ? tj.tiles[0] : url;
      const tileScheme  = (tj && tj.scheme === 'tms') ? 'tms' : (scheme === 'tms' ? 'tms' : 'xyz');

      try {
        map.addSource(SOURCE_ID, {
          type:        'raster',
          tiles:       [tileUrl],
          tileSize:    256,
          scheme:      tileScheme,
          minzoom:     tj?.minzoom  ?? 0,
          maxzoom:     tj?.maxzoom  ?? 22,
          attribution: tj?.attribution || 'TMS Imagery'
        });

        // Insert below GeoJSON layers so they always render on top
        map.addLayer({
          id:    LAYER_ID,
          type:  'raster',
          source: SOURCE_ID,
          paint: { 'raster-opacity': opacity / 100 }
        }, map.getLayer(GJ_FILL) ? GJ_FILL : undefined);

        setEmptyState(false);
        setInfoBadge(url, tj);

        if (tj && tj.bounds && tj.bounds.length === 4) {
          const [west, south, east, north] = tj.bounds;
          map.fitBounds([[west, south], [east, north]], { padding: 40, duration: 1200 });
          showStatus('Layer loaded — navigated to imagery bounds.', 'success');
        } else {
          showStatus('Layer added. No TileJSON found — navigate to the imagery manually.', 'info');
        }
      } catch (e) {
        showStatus('Failed to add layer: ' + e.message, 'error');
      }
    }

    function clearLayer() {
      removeLayer();
      setEmptyState(true);
      setInfoBadge(null);
      hideStatus();
      document.getElementById('tms-url').value = '';
    }

    // ── Tile error feedback ───────────────────────────────────
    map.on('error', e => {
      // Only surface tile errors for our overlay, not base map noise
      if (e.sourceId === SOURCE_ID) {
        showStatus('Tile request failed — check the URL or tile server availability.', 'error');
      }
    });

    // ── Opacity ───────────────────────────────────────────────
    const slider     = document.getElementById('opacity-slider');
    const opacityVal = document.getElementById('opacity-val');

    slider.addEventListener('input', () => {
      const v = parseInt(slider.value);
      opacityVal.textContent = v + '%';
      if (map.getLayer(LAYER_ID)) {
        map.setPaintProperty(LAYER_ID, 'raster-opacity', v / 100);
      }
    });

    // ── Button events ─────────────────────────────────────────
    document.getElementById('load-btn').addEventListener('click', () => {
      const url    = document.getElementById('tms-url').value;
      const scheme = document.querySelector('input[name="scheme"]:checked').value;
      loadTMS(url, scheme, parseInt(slider.value));
    });

    document.getElementById('clear-btn').addEventListener('click', clearLayer);

    document.getElementById('tms-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('load-btn').click();
    });

    // ── Zoom badge ────────────────────────────────────────────
    function updateZoomBadge() {
      document.getElementById('zoom-val').textContent = map.getZoom().toFixed(1);
    }
    map.on('zoom', updateZoomBadge);
    map.on('move', () => document.getElementById('feature-popup').classList.remove('visible'));


    // ── GeoJSON layer management ──────────────────────────────
    const GJ_SOURCE  = 'geojson-source';
    const GJ_FILL    = 'geojson-fill';
    const GJ_STROKE  = 'geojson-stroke';
    const GJ_CIRCLE  = 'geojson-circle';
    const GJ_LAYERS  = [GJ_FILL, GJ_STROKE, GJ_CIRCLE];

    let gjLoaded = false;

    function initGeoJSONLayers() {
      map.addSource(GJ_SOURCE, {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
        generateId: true
      });

      map.addLayer({
        id: GJ_FILL, type: 'fill', source: GJ_SOURCE,
        filter: ['==', ['geometry-type'], 'Polygon'],
        paint: {
          'fill-color': '#E8472A',
          'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.35, 0.15]
        }
      });

      map.addLayer({
        id: GJ_STROKE, type: 'line', source: GJ_SOURCE,
        filter: ['in', ['geometry-type'], ['literal', ['Polygon', 'LineString', 'MultiLineString', 'MultiPolygon']]],
        paint: {
          'line-color': '#E8472A',
          'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 2.5, 1.5],
          'line-opacity': 0.9
        }
      });

      map.addLayer({
        id: GJ_CIRCLE, type: 'circle', source: GJ_SOURCE,
        filter: ['in', ['geometry-type'], ['literal', ['Point', 'MultiPoint']]],
        paint: {
          'circle-radius': 6,
          'circle-color': '#E8472A',
          'circle-stroke-color': '#fff',
          'circle-stroke-width': 2,
          'circle-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 1, 0.85]
        }
      });
    }

    let loadedZoomLevel = null;

    function loadGeoJSON(data, filename) {
      if (!map.getSource(GJ_SOURCE)) return;

      map.getSource(GJ_SOURCE).setData(data);
      gjLoaded = true;

      // Capture zoom level from the first feature's tile_z property if present
      const firstFeat = data.features && data.features[0];
      loadedZoomLevel = firstFeat?.properties?.tile_z ?? null;

      const count    = data.features ? data.features.length : 0;
      const types    = [...new Set((data.features || []).map(f => f.geometry?.type).filter(Boolean))];

      document.getElementById('gj-name').textContent = filename;
      document.getElementById('gj-meta').textContent = `${count} feature${count !== 1 ? 's' : ''} · ${types.join(', ')}`;
      document.getElementById('geojson-badge').classList.add('visible');
      document.getElementById('clear-geojson-btn').style.display = '';
      const fnLabel = document.getElementById('gj-filename-label');
      fnLabel.textContent = filename;
      fnLabel.title = filename;
      fnLabel.classList.add('visible');

      // Fly to GeoJSON bounds
      if (count > 0) {
        const coords = [];
        const collect = (geom) => {
          if (!geom) return;
          if (geom.type === 'Point') { coords.push(geom.coordinates); return; }
          if (geom.coordinates) {
            const flat = (arr) => Array.isArray(arr[0]) ? arr.forEach(flat) : coords.push(arr);
            flat(geom.coordinates);
          }
        };
        data.features.forEach(f => collect(f.geometry));
        if (coords.length) {
          const lngs = coords.map(c => c[0]), lats = coords.map(c => c[1]);
          map.fitBounds(
            [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
            { padding: 60, duration: 800, maxZoom: 18 }
          );
        }
      }
    }

    function clearGeoJSON() {
      if (map.getSource(GJ_SOURCE)) {
        map.getSource(GJ_SOURCE).setData({ type: 'FeatureCollection', features: [] });
      }
      gjLoaded = false;
      document.getElementById('geojson-badge').classList.remove('visible');
      document.getElementById('clear-geojson-btn').style.display = 'none';
      document.getElementById('gj-filename-label').classList.remove('visible');
      document.getElementById('feature-popup').classList.remove('visible');
      tutorialFeatures.splice(0);
      loadedZoomLevel = null;
      renderTutorialList();
    }

    // ── Hover state ───────────────────────────────────────────
    let hoveredId = null;

    GJ_LAYERS.forEach(lid => {
      map.on('mousemove', lid, e => {
        if (!e.features.length) return;
        map.getCanvas().style.cursor = 'pointer';
        const id = e.features[0].id;
        if (hoveredId !== null && hoveredId !== id) {
          map.setFeatureState({ source: GJ_SOURCE, id: hoveredId }, { hover: false });
        }
        hoveredId = id;
        map.setFeatureState({ source: GJ_SOURCE, id: hoveredId }, { hover: true });
      });

      map.on('mouseleave', lid, () => {
        map.getCanvas().style.cursor = '';
        if (hoveredId !== null) {
          map.setFeatureState({ source: GJ_SOURCE, id: hoveredId }, { hover: false });
          hoveredId = null;
        }
      });
    });

    // ── Tutorial features ─────────────────────────────────────
    const tutorialFeatures = [];

    function renderTutorialList() {
      // Re-index screen numbers to stay sequential after any removal
      tutorialFeatures.forEach((f, i) => { f.screen = i; });

      const count = tutorialFeatures.length;
      document.getElementById('tutorial-count').textContent = count;
      document.getElementById('download-btn').disabled = count === 0;

      const list = document.getElementById('tutorial-list');
      if (!count) {
        list.innerHTML = '<div class="tutorial-empty">No features added yet.<br>Click a feature on the map and press "Add to Tutorial".</div>';
        return;
      }

      list.innerHTML = tutorialFeatures.map((f, i) => {
        const origProps = Object.entries(f.originalProps).map(([k, v]) =>
          `<div class="tc-prop"><span class="tc-key" title="${k}">${k}</span><span class="tc-val" title="${v}">${v}</span></div>`
        ).join('');

        const refsShort = `[${f.references.slice(0, 4).join(', ')}, … ×${f.references.length}]`;

        return `
          <div class="tutorial-card">
            <div class="tc-header">
              <span class="tc-screen">Screen ${f.screen}</span>
              <span class="tc-geom">${f.geomType}</span>
              <button class="tc-remove" title="Remove" onclick="removeFromTutorial(${i})">&#x2715;</button>
            </div>
            <div class="tc-props">${origProps}</div>
            <div class="tc-new-props">
              <div class="tc-new-row">
                <span class="tc-new-key">screen</span>
                <span class="tc-new-val">${f.screen}</span>
              </div>
              <div class="tc-new-row">
                <span class="tc-new-key">references</span>
                <span class="tc-new-val">${refsShort}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function removeFromTutorial(index) {
      tutorialFeatures.splice(index, 1);
      renderTutorialList();
      // Refresh add-button state if popup is open for the removed feature
      if (currentPopupFeature) syncAddButton();
    }

    function addToTutorial(feat) {
      const already = tutorialFeatures.some(f => f._mapId === feat.id);
      if (already) return;
      tutorialFeatures.push({
        _mapId:        feat.id,
        geomType:      feat.geometry?.type || '',
        geometry:      feat.geometry,
        originalProps: { ...(feat.properties || {}) },
        screen:        tutorialFeatures.length,
        references:    Array(parseInt(document.querySelector('input[name="subgrid"]:checked').value) ** 2).fill(0)
      });
      renderTutorialList();
      syncAddButton();
    }

    function downloadTutorialFeatures() {
      if (!tutorialFeatures.length) return;
      const subgridVal = parseInt(document.querySelector('input[name="subgrid"]:checked').value);
      const fc = {
        type: 'FeatureCollection',
        metadata: {
          zoom_level:    loadedZoomLevel,
          sub_grid_size: subgridVal
        },
        features: tutorialFeatures.map(f => ({
          type: 'Feature',
          geometry: f.geometry,
          properties: {
            ...f.originalProps,
            screen:     f.screen,
            references: f.references
          }
        }))
      };
      const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/geo+json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      const zoomPart    = loadedZoomLevel !== null ? `_z${loadedZoomLevel}` : '';
      const subgridPart = `_${subgridVal}x${subgridVal}`;
      a.download = `tutorial_features${zoomPart}${subgridPart}.geojson`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('download-btn').addEventListener('click', downloadTutorialFeatures);

    document.querySelectorAll('input[name="subgrid"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const size = parseInt(radio.value) ** 2;
        tutorialFeatures.forEach(f => { f.references = Array(size).fill(0); });
        renderTutorialList();
      });
    });

    // ── Feature popup ─────────────────────────────────────────
    let currentPopupFeature = null;

    function syncAddButton() {
      const btn     = document.getElementById('popup-add-btn');
      if (!currentPopupFeature) return;
      const added   = tutorialFeatures.some(f => f._mapId === currentPopupFeature.id);
      btn.disabled  = added;
      btn.innerHTML = added
        ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Added`
        : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to Tutorial`;
    }

    function showPopup(point, feature) {
      currentPopupFeature = feature;
      const props    = feature.properties || {};
      const geomType = feature.geometry?.type || '';

      document.getElementById('popup-geom').textContent = geomType;
      const keys = Object.keys(props);
      document.getElementById('popup-body').innerHTML = keys.length
        ? keys.map(k => {
            const v   = props[k];
            const val = v === null || v === undefined ? 'null' : String(v);
            const cls = (v === null || v === undefined) ? 'null-val' : '';
            return `<div class="popup-row"><span class="popup-key" title="${k}">${k}</span><span class="popup-val ${cls}" title="${val}">${val}</span></div>`;
          }).join('')
        : '<div class="popup-empty">No properties.</div>';

      syncAddButton();

      // Render hidden to measure, then position near cursor
      const popup = document.getElementById('feature-popup');
      popup.style.visibility = 'hidden';
      popup.classList.add('visible');

      requestAnimationFrame(() => {
        const mapEl = document.getElementById('map');
        const W     = popup.offsetWidth;
        const H     = popup.offsetHeight;
        const mapW  = mapEl.offsetWidth;
        const mapH  = mapEl.offsetHeight;
        const OFF   = 14;

        let left = point.x + OFF;
        let top  = point.y + OFF;
        if (left + W > mapW - OFF) left = point.x - W - OFF;
        if (top  + H > mapH - OFF) top  = point.y - H - OFF;

        popup.style.left       = Math.max(OFF, left) + 'px';
        popup.style.top        = Math.max(OFF, top)  + 'px';
        popup.style.visibility = 'visible';
      });
    }

    document.getElementById('popup-add-btn').addEventListener('click', () => {
      if (currentPopupFeature) addToTutorial(currentPopupFeature);
    });

    GJ_LAYERS.forEach(lid => {
      map.on('click', lid, e => {
        if (!e.features.length) return;
        e.originalEvent.stopPropagation();
        showPopup(e.point, e.features[0]);
      });
    });

    // Close popup when clicking the map outside a GeoJSON feature
    map.on('click', e => {
      const hit = GJ_LAYERS.some(lid => map.queryRenderedFeatures(e.point, { layers: [lid] }).length > 0);
      if (!hit) document.getElementById('feature-popup').classList.remove('visible');
    });

    document.getElementById('popup-close').addEventListener('click', () => {
      document.getElementById('feature-popup').classList.remove('visible');
    });

    // ── File input & drag-drop ────────────────────────────────
    function readGeoJSONFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        try {
          const data = JSON.parse(evt.target.result);
          loadGeoJSON(data, file.name);
        } catch {
          showStatus('Invalid GeoJSON file.', 'error');
        }
      };
      reader.readAsText(file);
    }

    document.getElementById('geojson-btn').addEventListener('click', () => {
      document.getElementById('geojson-input').click();
    });

    document.getElementById('geojson-input').addEventListener('change', e => {
      readGeoJSONFile(e.target.files[0]);
      e.target.value = '';
    });

    document.getElementById('clear-geojson-btn').addEventListener('click', clearGeoJSON);

    const mapWrapper = document.querySelector('#map').parentElement;

    mapWrapper.addEventListener('dragover', e => {
      e.preventDefault();
      document.getElementById('drop-overlay').classList.add('active');
    });

    mapWrapper.addEventListener('dragleave', e => {
      if (!mapWrapper.contains(e.relatedTarget)) {
        document.getElementById('drop-overlay').classList.remove('active');
      }
    });

    mapWrapper.addEventListener('drop', e => {
      e.preventDefault();
      document.getElementById('drop-overlay').classList.remove('active');
      const file = e.dataTransfer.files[0];
      if (file) readGeoJSONFile(file);
    });

    // ── Auto-load default URL on startup ──────────────────────
    map.on('load', () => {
      updateZoomBadge();
      initGeoJSONLayers();

      // Auto-load the default project geometry
      fetch('processed_geometry (1).geojson')
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => loadGeoJSON(data, 'processed_geometry (1).geojson'))
        .catch(() => {}); // silent — file may not be available when opened from file://

      const defaultUrl = document.getElementById('tms-url').value.trim();
      if (defaultUrl) {
        const scheme = document.querySelector('input[name="scheme"]:checked').value;
        loadTMS(defaultUrl, scheme, parseInt(slider.value));
      } else {
        setEmptyState(true);
      }
    });

  </script>
</body>
</html>
